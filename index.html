<!DOCTYPE html>
<html lang="en">
<head>
    <center><h2>Aviator Client-Side Clone</h2></center>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spribe Clone - Browser Only</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --primary-red: #cb011a;
            --primary-green: #28a745;
            --text-main: #ffffff;
            --text-muted: #808191;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* Auth Screen */
        .auth-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 320px;
            text-align: center;
        }

        .auth-container h2 { margin-top: 0; color: var(--primary-red); }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #252529;
            border: 1px solid #333;
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary-red);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { filter: brightness(1.2); }
        .toggle-auth { color: var(--text-muted); font-size: 12px; margin-top: 15px; cursor: pointer; }

        /* Game Layout */
        .game-container {
            width: 90%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2d2d34;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .logo { font-size: 24px; font-weight: bold; color: var(--primary-red); }
        .balance-box { background: #252529; padding: 8px 16px; border-radius: 20px; font-weight: bold; }

        /* Main Game Arena */
        .main-arena {
            position: relative;
            background: #0d0d0f;
            border-radius: 12px;
            height: 300px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #multiplier-display {
            position: relative;
            font-size: 5rem;
            font-weight: 900;
            z-index: 10;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: color 0.1s ease;
        }

        .flea-away { color: var(--primary-red) !important; }

        /* Betting Section */
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .bet-card {
            background: #252529;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bet-btn {
            background: var(--primary-green);
            font-size: 18px;
            height: 50px;
        }
        .bet-btn.abort { background: var(--primary-red); }
        .bet-btn:disabled { background: #444; cursor: not-allowed; }

        /* Fake Live Feed */
        .history-ribbon {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 0;
            margin-bottom: 10px;
        }
        .hist-item {
            background: #252529;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .hist-item.high { color: #963be0; }
        .hist-item.low { color: #34b4ff; }
    </style>
</head>
<body>

    <!-- AUTHENTICATION LAYER -->
    <div id="auth-screen" class="auth-container">
        <h2 id="auth-title">Sign In</h2>
        <input type="text" id="auth-username" placeholder="Username">
        <input type="password" id="auth-password" placeholder="Password">
        <button id="auth-submit-btn" onclick="handleAuthSubmit()">Login</button>
        <div class="toggle-auth" id="auth-toggle" onclick="toggleAuthMode()">Don't have an account? Sign Up</div>
    </div>

    <!-- GAME MAIN INTERFACE -->
    <div id="game-screen" class="game-container hidden">
        <header>
            <div class="logo">AVIATOR <span style="font-size:12px; color:var(--text-muted)">CLONE</span></div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="balance-box">ID: <span id="user-display">...</span></div>
                <div class="balance-box" style="color: #ffc107;">$ <span id="balance-display">0.00</span></div>
                <button onclick="logout()" style="width:auto; padding: 5px 10px; font-size:12px;">Logout</button>
            </div>
        </header>

        <!-- Simulated Previous Rounds -->
        <div class="history-ribbon" id="history-ribbon"></div>

        <div class="main-arena">
            <canvas id="gameCanvas"></canvas>
            <div id="multiplier-display">1.00x</div>
        </div>

        <div class="controls">
            <div class="bet-card">
                <input type="number" id="bet-amount" value="10" min="1" step="1">
                <button id="bet-btn" class="bet-btn" onclick="handleBetClick()">BET</button>
            </div>
            <div class="bet-card" style="justify-content: center; color: var(--text-muted); font-size: 13px;">
                <p>💡 Status server connection: <span style="color: var(--primary-green)">Secure (Local)</span></p>
                <p>Every account data, history, and configuration is safely contained right inside your current web browser sandbox.</p>
            </div>
        </div>
    </div>

<script>
    // --- PSEUDO BACKEND / ENGINE DATABASE ---
    const DB = {
        getUsers: () => JSON.parse(localStorage.getItem('fake_db_users')) || [],
        saveUsers: (users) => localStorage.setItem('fake_db_users', JSON.stringify(users)),
        
        register: (username, password) => {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    let users = DB.getUsers();
                    if(users.find(u => u.username === username)) return reject("Username taken!");
                    let newUser = { username, password, balance: 1000.00, history: [] };
                    users.push(newUser);
                    DB.saveUsers(users);
                    resolve(newUser);
                }, 400); // Network delay simulation
            });
        },

        login: (username, password) => {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    let users = DB.getUsers();
                    let user = users.find(u => u.username === username && u.password === password);
                    if(!user) return reject("Invalid credentials!");
                    resolve(user);
                }, 400);
            });
        },

        updateUser: (username, updateFn) => {
            let users = DB.getUsers();
            let idx = users.findIndex(u => u.username === username);
            if(idx !== -1) {
                updateFn(users[idx]);
                DB.saveUsers(users);
                updateUI();
            }
        }
    };

    // --- APPLICATION STATE ---
    let currentUser = null;
    let authMode = "login"; // or "signup"
    
    let gameState = "waiting"; // waiting, running, crashed
    let currentMultiplier = 1.00;
    let crashPoint = 1.00;
    let betPlaced = false;
    let betAmount = 0;
    let loopId = null;
    let startTime = null;

    // Canvas properties
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- AUTH FLOW CONTROLLERS ---
    function toggleAuthMode() {
        authMode = authMode === "login" ? "signup" : "login";
        document.getElementById('auth-title').innerText = authMode === "login" ? "Sign In" : "Create Account";
        document.getElementById('auth-submit-btn').innerText = authMode === "login" ? "Login" : "Register";
        document.getElementById('auth-toggle').innerText = authMode === "login" ? "Don't have an account? Sign Up" : "Already have an account? Login";
    }

    async function handleAuthSubmit() {
        const u = document.getElementById('auth-username').value.trim();
        const p = document.getElementById('auth-password').value.trim();
        if(!u || !p) return alert("Fill all fields");

        const btn = document.getElementById('auth-submit-btn');
        btn.disabled = true; btn.innerText = "Connecting...";

        try {
            let user = authMode === "login" ? await DB.login(u, p) : await DB.register(u, p);
            sessionStorage.setItem('current_session', user.username);
            initApp();
        } catch(err) {
            alert(err);
        } finally {
            btn.disabled = false;
            btn.innerText = authMode === "login" ? "Login" : "Register";
        }
    }

    function logout() {
        sessionStorage.removeItem('current_session');
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('auth-screen').classList.remove('hidden');
    }

    // --- MAIN ENGINE INITIALIZATION ---
    function initApp() {
        let session = sessionStorage.getItem('current_session');
        if(!session) return;

        let users = DB.getUsers();
        currentUser = users.find(u => u.username === session);
        if(!currentUser) return;

        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        
        updateUI();
        seedFakeHistory();
        startNextRoundLoop();
    }

    function updateUI() {
        if(!currentUser) return;
        // Fetch fresh object instance from DB array
        currentUser = DB.getUsers().find(u => u.username === currentUser.username);
        document.getElementById('user-display').innerText = currentUser.username;
        document.getElementById('balance-display').innerText = currentUser.balance.toFixed(2);
    }

    function seedFakeHistory() {
        const ribbon = document.getElementById('history-ribbon');
        ribbon.innerHTML = '';
        for(let i=0; i<12; i++) {
            let val = (Math.random() * 5 + 1).toFixed(2);
            addHistoryItem(val);
        }
    }

    function addHistoryItem(val) {
        const ribbon = document.getElementById('history-ribbon');
        const item = document.createElement('div');
        item.className = `hist-item ${val > 2 ? 'high' : 'low'}`;
        item.innerText = `${val}x`;
        ribbon.prepend(item);
        if(ribbon.children.length > 15) ribbon.lastChild.remove();
    }

    // --- GAME MECHANICS / ALGORITHM ---
    function generateCrashPoint() {
        // Simple real-world Provably Fair style math emulated
        let e = Math.random();
        if (e < 0.03) return 1.00; // 3% instant house crash
        return Math.max(1.00, parseFloat((0.97 / (1 - e)).toFixed(2)));
    }

    function startNextRoundLoop() {
        gameState = "waiting";
        betPlaced = false;
        currentMultiplier = 1.00;
        
        const multDisplay = document.getElementById('multiplier-display');
        multDisplay.classList.remove('flea-away');
        multDisplay.innerText = "Waiting for next round...";
        multDisplay.style.fontSize = "2rem";

        const betBtn = document.getElementById('bet-btn');
        betBtn.className = "bet-btn";
        betBtn.innerText = "BET";
        betBtn.disabled = false;

        setTimeout(() => {
            runRound();
        }, 4000); // 4 seconds intermission
    }

    function runRound() {
        gameState = "running";
        crashPoint = generateCrashPoint();
        startTime = performance.now();
        
        const multDisplay = document.getElementById('multiplier-display');
        multDisplay.style.fontSize = "5rem";

        if(betPlaced) {
            const betBtn = document.getElementById('bet-btn');
            betBtn.className = "bet-btn abort";
            betBtn.innerText = `CASH OUT ${(betAmount * 1.00).toFixed(2)}`;
        }

        function update(now) {
            if(gameState !== "running") return;

            let elapsed = (now - startTime) / 1000;
            // Exponential growth simulation curve
            currentMultiplier = parseFloat(Math.pow(Math.E, 0.06 * elapsed).toFixed(2));

            if(currentMultiplier >= crashPoint) {
                triggerCrash();
                return;
            }

            multDisplay.innerText = `${currentMultiplier.toFixed(2)}x`;
            
            if(betPlaced && gameState === "running") {
                document.getElementById('bet-btn').innerText = `CASH OUT ${(betAmount * currentMultiplier).toFixed(2)}`;
            }

            drawScene(elapsed);
            loopId = requestAnimationFrame(update);
        }
        loopId = requestAnimationFrame(update);
    }

    function triggerCrash() {
        gameState = "crashed";
        cancelAnimationFrame(loopId);
        
        const multDisplay = document.getElementById('multiplier-display');
        multDisplay.innerText = `FLEW AWAY\n(${crashPoint.toFixed(2)}x)`;
        multDisplay.classList.add('flea-away');

        const betBtn = document.getElementById('bet-btn');
        betBtn.disabled = true;
        betBtn.className = "bet-btn";
        betBtn.innerText = "BET";

        addHistoryItem(crashPoint.toFixed(2));
        startNextRoundLoop();
    }

    function handleBetClick() {
        if(gameState === "waiting" && !betPlaced) {
            // Place bet
            let amt = parseFloat(document.getElementById('bet-amount').value);
            if(isNaN(amt) || amt <= 0 || amt > currentUser.balance) return alert("Invalid Bet Amount");

            DB.updateUser(currentUser.username, (user) => {
                user.balance -= amt;
            });
            
            betAmount = amt;
            betPlaced = true;
            
            const betBtn = document.getElementById('bet-btn');
            betBtn.innerText = "WAITING...";
            betBtn.disabled = true;
        } 
        else if(gameState === "running" && betPlaced) {
            // Cash Out execution
            let winAmt = betAmount * currentMultiplier;
            
            DB.updateUser(currentUser.username, (user) => {
                user.balance += winAmt;
            });

            betPlaced = false;
            
            const betBtn = document.getElementById('bet-btn');
            betBtn.className = "bet-btn";
            betBtn.innerText = `WON $${winAmt.toFixed(2)}`;
            betBtn.disabled = true;

            confetti({ particleCount: 80, spread: 60, origin: { y: 0.7 } });
        }
    }

    // --- GRAPHICS RENDER ENGINE ---
    function drawScene(time) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (gameState !== "running") return;

        let startX = 50;
        let startY = canvas.height - 50;
        
        // Progress percentage calculation mapped into canvas sizes
        let progress = Math.min(time / 15, 1); 
        let currentX = startX + (canvas.width - 150) * progress;
        let currentY = startY - (canvas.height - 120) * Math.sin(progress * Math.PI / 2);

        // Grid Background lines
        ctx.strokeStyle = '#1d1d22';
        ctx.lineWidth = 1;
        for(let i = 0; i < canvas.width; i += 40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for(let j = 0; j < canvas.height; j += 40) {
            ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
        }

        // Draw Bezier flight track line
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.quadraticCurveTo((startX + currentX)/2, startY, currentX, currentY);
        ctx.strokeStyle = varColor('--primary-red');
        ctx.lineWidth = 4;
        ctx.shadowColor = varColor('--primary-red');
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.shadowBlur = 0; // reset

        // Draw Plane element indicator (vector path circle approximation)
        ctx.beginPath();
        ctx.arc(currentX, currentY, 8, 0, 2 * Math.PI);
        ctx.fillStyle = '#fff';
        ctx.fill();
    }

    function varColor(varName) {
        return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    }

    // Auto-login runtime initialization check
    window.onload = () => {
        if(sessionStorage.getItem('current_session')) {
            initApp();
        }
    }
</script>
</body>
</html>
